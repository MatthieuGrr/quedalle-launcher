name: Tag and release v2.0

# One-shot: triggered by the commit that adds this file, then removed.
on:
  push:
    branches: [main]
    paths: ['.github/workflows/tag-v2.0.yml']

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag on the v2.0 merge commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v2.0 596cbf0438fff0c9c5983bf2506e8a93e851c70d
          git push origin v2.0

      - name: Checkout tagged commit
        run: git checkout v2.0

      - name: Set Java 17
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Build APKs
        run: ./gradlew assembleRelease assembleDebug

      - name: Create GitHub Release
        run: |
          gh release create v2.0 \
            --title "Quedalle v2.0" \
            --generate-notes \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GH_TOKEN: ${{ github.token }}
